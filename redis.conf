# Redis Configuration for TradeOn Engine
# Persistence: AOF + RDB for crash recovery

# ─── AOF (Append Only File) ──────────────────────────
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ─── RDB (Snapshotting) ──────────────────────────────
save 900 1
save 300 10
save 60 10000

# ─── Memory ──────────────────────────────────────────
maxmemory 256mb
maxmemory-policy noeviction

# ─── General ─────────────────────────────────────────
bind 0.0.0.0
protected-mode no
